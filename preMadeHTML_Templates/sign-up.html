<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Data Business</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.4/dist/full.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'base-100': '#1b252f',
                        'base-content': '#cccfd1',
                        'primary': '#fa186b',
                        'primary-content': '#ffffff',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-base-100 text-base-content min-h-screen">
    <div class="container mx-auto px-4">

        <main class="py-10 lg:py-20">
            <div class="max-w-md mx-auto">
                <h1 class="text-3xl font-bold mb-6 text-center">Create an Account</h1>
                <form class="space-y-4">
                    <div>
                        <label for="firstName" class="block text-sm font-medium mb-1">Vorname</label>
                        <input type="text" id="firstName" name="firstName" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary bg-base-100 text-base-content">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium mb-1">Email</label>
                        <input type="email" id="email" name="email" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary bg-base-100 text-base-content">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium mb-1">Passwort</label>
                        <input type="password" id="password" name="password" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary bg-base-100 text-base-content">
                    </div>
                    <div>
                        <label for="confirmPassword" class="block text-sm font-medium mb-1">Passwort bestätigen</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary bg-base-100 text-base-content">
                    </div>
                    <div>
                        <button type="submit" class="w-full btn btn-primary text-primary-content">
                            Registrieren
                        </button>
                    </div>
                </form>
                <p class="mt-4 text-center text-sm">
                    Bereits ein Konto? <a href="/login" class="text-primary hover:underline">Anmelden</a>
                </p>
            </div>
        </main>
    </div>
</body>
</html>
